<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Edgerton Dental Clinic – Surgery Checklists</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#ddedf7;min-height:100vh;color:#1a2e44;}

.topbar{background:#fff;border-bottom:2px solid #c2ddf0;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(26,82,118,.07);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.brand-name{font-size:15px;font-weight:800;color:#1a5276;line-height:1.1;}
.brand-sub{font-size:11px;color:#7f8c8d;font-weight:500;}
.date-chip{background:#b8d8ef;color:#0f3a57;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;}
.report-btn{background:#1a5276;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;}
.report-btn:hover{background:#154360;}

.view{display:none;}.view.active{display:block;}

.wrap{max-width:900px;margin:0 auto;padding:24px 16px;}
.wrap-narrow{max-width:620px;margin:0 auto;padding:24px 16px;}

.section-label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#5a8fa8;margin-bottom:10px;margin-top:4px;}

.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.week-nav-btn{background:#fff;border:2px solid #94c4e0;border-radius:8px;padding:6px 14px;font-weight:700;color:#1a5276;cursor:pointer;font-size:14px;}
.week-nav-btn:hover{border-color:#1a5276;}
.week-label{flex:1;text-align:center;font-size:12px;font-weight:700;color:#1a5276;background:#c8e1f0;border-radius:8px;padding:7px 10px;}
.week-label span{color:#7f8c8d;font-weight:500;}

.day-row{display:flex;gap:8px;margin-bottom:24px;}
.day-btn{flex:1;padding:8px 4px;border:2px solid #94c4e0;border-radius:10px;background:#fff;color:#5d8aa8;font-weight:600;font-size:12px;cursor:pointer;transition:all .12s;line-height:1.3;}
.day-btn:hover{border-color:#1a5276;color:#1a5276;}
.day-btn.active{border-color:#1a5276;background:#1a5276;color:#fff;}
.day-btn .today-dot{font-size:9px;opacity:.8;}

.surgery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:0;}
.surgery-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 3px 12px rgba(26,82,118,.1);border:1.5px solid #b8d8ef;transition:box-shadow .15s;}
.surgery-card:hover{box-shadow:0 6px 20px rgba(26,82,118,.13);}
.surgery-card.dental{background:linear-gradient(145deg,#e8f4fc,#fff);border-color:#7db9e0;}
.surgery-card.hygienist{background:linear-gradient(145deg,#e8faf2,#fff);border-color:#6dc495;}
.surgery-card-name{font-weight:800;font-size:14px;margin-bottom:2px;}
.surgery-card.dental .surgery-card-name{color:#1a5276;}
.surgery-card.hygienist .surgery-card-name{color:#1e8449;}
.surgery-card-type{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.surgery-card.dental .surgery-card-type{color:#7fb3d3;}
.surgery-card.hygienist .surgery-card-type{color:#7dbb9a;}
.surgery-card-icon{font-size:22px;margin-bottom:6px;}
.badge-row{display:flex;gap:6px;}
.cl-badge{flex:1;padding:7px 4px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #94c4e0;background:#eaf4fb;color:#5d8aa8;transition:all .12s;text-align:center;}
.cl-badge:hover{border-color:#1a5276;color:#1a5276;}
.cl-badge.partial{border-color:#f39c12;background:#fef9ee;color:#e67e22;}
.cl-badge.done{border-color:#27ae60;background:#eafaf1;color:#27ae60;}
.surgery-card.hygienist .cl-badge{border-color:#a9dfbf;background:#f0fff8;color:#1e8449;}
.surgery-card.hygienist .cl-badge:hover{border-color:#1e8449;}
.surgery-card.hygienist .cl-badge.partial{border-color:#f39c12;background:#fef9ee;color:#e67e22;}
.surgery-card.hygienist .cl-badge.done{border-color:#27ae60;background:#eafaf1;color:#27ae60;}
.cl-badge.decon{background:#f5f0ff;border-color:#c39bd3;color:#7d3c98;}
.cl-badge.decon.partial{background:#f3e5f5;border-color:#c39bd3;color:#7d3c98;}
.cl-badge.decon.done{border-color:#27ae60;background:#eafaf1;color:#27ae60;}

.decon-card{background:linear-gradient(135deg,#f5eeff,#fff);border-radius:14px;padding:14px 16px;box-shadow:0 3px 12px rgba(125,60,152,.1);border:1.5px solid #b07fd4;grid-column:1/-1;}
.decon-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.decon-title{font-weight:800;color:#7d3c98;font-size:14px;}
.decon-sub{font-size:11px;color:#a569bd;font-weight:500;}

.cl-header{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:16px;box-shadow:0 3px 12px rgba(26,82,118,.1);border:1px solid #c2ddf0;display:flex;align-items:center;gap:14px;}
.back-btn{background:none;border:none;color:#1a5276;font-weight:700;font-size:14px;cursor:pointer;padding:0;white-space:nowrap;}
.cl-titles{flex:1;}
.cl-title{font-weight:800;font-size:17px;color:#1a5276;}
.cl-sub{font-size:12px;color:#7f8c8d;margin-top:2px;}

.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.item-row{display:flex;align-items:flex-start;gap:12px;background:#fff;border-radius:10px;padding:12px 16px;border:1.5px solid #c8dff0;cursor:pointer;transition:border-color .1s,background .1s;}
.item-row:hover{border-color:#aed6f1;}
.item-row.checked{background:#eafaf1;border-color:#a9dfbf;}
.item-row input[type=checkbox]{width:18px;height:18px;accent-color:#27ae60;cursor:pointer;flex-shrink:0;margin-top:1px;}
.item-text{font-size:13px;color:#2c3e50;line-height:1.45;}
.item-row.checked .item-text{color:#27ae60;font-weight:600;}

.sig-section{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 3px 12px rgba(26,82,118,.1);border:1px solid #c2ddf0;margin-bottom:24px;}
.sig-title{font-weight:700;font-size:14px;color:#1a5276;margin-bottom:12px;}
.sig-input{width:100%;border:1.5px solid #94c4e0;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:10px;outline:none;font-family:inherit;transition:border-color .15s;}
.sig-input:focus{border-color:#1a5276;}
.sig-input:disabled{background:#f8f8f8;color:#aaa;}
textarea.sig-input{resize:vertical;line-height:1.5;}
.submit-btn{width:100%;padding:14px;border:none;border-radius:10px;background:#27ae60;color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;transition:background .15s;}
.submit-btn:hover:not(:disabled){background:#1e8449;}
.submit-btn:disabled{background:#bdc3c7;cursor:not-allowed;}
.submitted-badge{background:#eafaf1;border:1.5px solid #27ae60;color:#27ae60;border-radius:10px;padding:14px;font-weight:700;font-size:13px;text-align:center;}

.report-header{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:16px;box-shadow:0 3px 12px rgba(26,82,118,.1);border:1px solid #c2ddf0;display:flex;align-items:center;gap:14px;}
.report-title{font-weight:800;font-size:17px;color:#1a5276;}
.lock-btn{margin-left:auto;background:#fdf2f2;border:1.5px solid #f5c6cb;color:#c0392b;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;}

.report-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 2px 8px rgba(26,82,118,.1);border:1px solid #c2ddf0;text-align:center;}
.stat-num{font-size:28px;font-weight:800;color:#1a5276;}
.stat-label{font-size:11px;color:#7f8c8d;font-weight:600;margin-top:2px;}

.report-list{display:flex;flex-direction:column;gap:12px;}
.report-card{background:#fff;border-radius:14px;padding:16px 20px;box-shadow:0 3px 10px rgba(26,82,118,.1);border-left:4px solid #27ae60;cursor:pointer;transition:box-shadow .15s;}
.report-card:hover{box-shadow:0 4px 16px rgba(26,82,118,.12);}
.report-card.incomplete{border-left-color:#e67e22;}
.report-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.report-card-id{font-weight:800;font-size:15px;color:#1a5276;}
.report-card-type{color:#5d8aa8;font-size:13px;font-weight:600;}
.report-card-day{color:#95a5a6;font-size:12px;}
.report-status-full{background:#eafaf1;color:#27ae60;font-weight:700;font-size:12px;padding:3px 12px;border-radius:20px;}
.report-status-part{background:#fef9ee;color:#e67e22;font-weight:700;font-size:12px;padding:3px 12px;border-radius:20px;}
.report-meta{font-size:12px;color:#7f8c8d;margin-bottom:3px;}
.report-meta strong{color:#2c3e50;}
.view-hint{font-size:11px;color:#95a5a6;font-weight:600;}
.missing-box{background:#fdf2f2;border:1px solid #f5c6cb;border-radius:8px;padding:10px 14px;margin-top:10px;}
.missing-title{color:#c0392b;font-weight:700;font-size:12px;margin-bottom:5px;}
.missing-item{color:#c0392b;font-size:11px;margin-bottom:3px;}
.notes-box{background:#fafafa;border:1px solid #e8f0f7;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:12px;color:#2c3e50;}
.notes-label{font-weight:700;color:#5d8aa8;margin-bottom:3px;font-size:11px;}
.comment-section{background:#f9f4ff;border:1.5px solid #c39bd3;border-radius:12px;padding:16px 18px;margin-top:12px;}
.comment-section.comment-readonly{background:#f8f8f8;border-color:#ddd;}
.comment-title{font-weight:800;font-size:13px;color:#7d3c98;margin-bottom:10px;}
.existing-comment{background:#fff;border-radius:8px;padding:12px 14px;margin-bottom:10px;border:1px solid #e8d5f5;}
.existing-comment-meta{font-size:11px;color:#a569bd;font-weight:600;margin-bottom:5px;}
.existing-comment-text{font-size:13px;color:#2c3e50;line-height:1.5;}
.edit-comment-btn{background:none;border:none;color:#7d3c98;font-size:12px;font-weight:700;cursor:pointer;padding:4px 0;margin-top:6px;}
.edit-comment-btn:hover{text-decoration:underline;}

.empty-state{text-align:center;color:#95a5a6;padding:60px 20px;font-size:14px;}
.empty-emoji{font-size:40px;margin-bottom:12px;}

#loading-overlay{position:fixed;inset:0;background:rgba(220,237,248,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.spinner{width:42px;height:42px;border:4px solid #d5e8f5;border-top-color:#1a5276;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-weight:700;color:#1a5276;font-size:14px;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a5276;color:#fff;padding:12px 22px;border-radius:10px;font-weight:700;font-size:14px;z-index:999;transition:transform .3s ease;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}

.modal-overlay{position:fixed;inset:0;background:rgba(15,30,50,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:#fff;border-radius:18px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;}
.modal-icon{font-size:36px;margin-bottom:12px;}
.modal-title{font-weight:800;font-size:18px;color:#1a5276;margin-bottom:6px;}
.modal-sub{font-size:13px;color:#7f8c8d;margin-bottom:22px;}
.modal-input{width:100%;border:2px solid #d5e8f5;border-radius:10px;padding:12px 16px;font-size:15px;font-family:inherit;outline:none;text-align:center;letter-spacing:.15em;margin-bottom:12px;transition:border-color .15s;}
.modal-input:focus{border-color:#1a5276;}
.modal-input.shake{border-color:#e74c3c;animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.modal-btn{width:100%;padding:13px;border:none;border-radius:10px;background:#1a5276;color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;margin-bottom:8px;}
.modal-btn:hover{background:#154360;}
.modal-cancel{width:100%;padding:10px;border:none;background:none;color:#95a5a6;font-size:13px;cursor:pointer;font-family:inherit;}
.modal-cancel:hover{color:#1a5276;}
.role-selector{display:flex;gap:8px;margin-bottom:16px;}
.role-btn{flex:1;padding:9px;border:2px solid #d5e8f5;border-radius:8px;background:#f8fbfd;color:#5d8aa8;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;}
.role-btn:hover{border-color:#1a5276;color:#1a5276;}
.role-btn.active{border-color:#1a5276;background:#1a5276;color:#fff;}
.modal-error{color:#e74c3c;font-size:12px;font-weight:600;margin-bottom:10px;min-height:18px;}

@media(max-width:500px){.surgery-grid{grid-template-columns:1fr 1fr;}.topbar{padding:0 12px;}.report-btn span{display:none;}}
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><div class="loading-text">Connecting to database…</div></div>
<div id="toast"></div>

<!-- Password Modal -->
<div class="modal-overlay hidden" id="pw-modal">
  <div class="modal-box">
    <div class="modal-icon">🔒</div>
    <div class="modal-title">Report Access</div>
    <div class="modal-sub">Select your role and enter your password</div>
    <div class="role-selector" id="role-selector">
      <button class="role-btn active" data-role="manager">Manager</button>
      <button class="role-btn" data-role="senior">Senior Nurse</button>
    </div>
    <input class="modal-input" id="pw-input" type="password" placeholder="Password" maxlength="30"/>
    <div class="modal-error" id="pw-error"></div>
    <button class="modal-btn" id="pw-confirm">Unlock Report</button>
    <button class="modal-cancel" id="pw-cancel">Cancel</button>
  </div>
</div>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <ellipse cx="18" cy="22" rx="11" ry="9" fill="#1a5276" opacity="0.12"/>
      <path d="M8 15 Q10 5 18 8 Q26 5 28 15 Q30 25 23 29 Q18 32 13 29 Q6 25 8 15Z" fill="#1a5276"/>
      <path d="M18 11 Q21 16 18 21 Q15 16 18 11Z" fill="white" opacity="0.35"/>
    </svg>
    <div>
      <div class="brand-name">Edgerton Dental Clinic</div>
      <div class="brand-sub">& Implant Centre — Surgery Checklists</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="date-chip" id="date-chip"></div>
    <button class="report-btn" id="report-btn">📋 <span>Manager Report</span></button>
  </div>
</div>

<!-- HOME -->
<div id="view-home" class="view active">
  <div class="wrap">
    <div class="section-label">Select Week & Day</div>
    <div class="week-nav">
      <button class="week-nav-btn" id="week-prev">◀</button>
      <div class="week-label" id="week-label"></div>
      <button class="week-nav-btn" id="week-next">▶</button>
    </div>
    <div class="day-row" id="day-row"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;margin-top:4px;">
      <div class="section-label" style="margin:0">Surgeries</div>
      <div style="display:flex;gap:12px;align-items:center;">
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#1a5276;">
          <span style="width:10px;height:10px;border-radius:3px;background:linear-gradient(145deg,#f0f7ff,#aed6f1);display:inline-block;border:1px solid #aed6f1"></span>Dental Surgery
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#1e8449;">
          <span style="width:10px;height:10px;border-radius:3px;background:linear-gradient(145deg,#f0fff8,#a9dfbf);display:inline-block;border:1px solid #a9dfbf"></span>Hygienist Room
        </div>
        <div style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#7d3c98;">
          <span style="width:10px;height:10px;border-radius:3px;background:linear-gradient(145deg,#fdf5ff,#c39bd3);display:inline-block;border:1px solid #c39bd3"></span>Decon Room
        </div>
      </div>
    </div>
    <div class="surgery-grid" id="surgery-grid"></div>
  </div>
</div>

<!-- CHECKLIST -->
<div id="view-checklist" class="view">
  <div class="wrap-narrow">
    <div class="cl-header">
      <button class="back-btn" id="cl-back">← Back</button>
      <div class="cl-titles">
        <div class="cl-title" id="cl-title"></div>
        <div class="cl-sub" id="cl-sub"></div>
      </div>
      <svg viewBox="0 0 36 36" width="54" height="54" style="flex-shrink:0">
        <circle cx="18" cy="18" r="15.9" fill="none" stroke="#e8f0f7" stroke-width="3"/>
        <circle id="ring-fill" cx="18" cy="18" r="15.9" fill="none" stroke="#1a5276"
          stroke-width="3" stroke-dasharray="0 100" stroke-linecap="round"
          stroke-dashoffset="25" transform="rotate(-90 18 18)"/>
        <text id="ring-text" x="18" y="22" text-anchor="middle" font-size="8"
          fill="#1a5276" font-weight="700" font-family="Inter,sans-serif"></text>
      </svg>
    </div>
    <div class="item-list" id="item-list"></div>
    <div class="sig-section">
      <div class="sig-title">Sign Off</div>
      <input class="sig-input" id="nurse-input" type="text" placeholder="Nurse name / signature"/>
      <input class="sig-input" id="manager-input" type="text" placeholder="Manager name / signature (optional)"/>
      <textarea class="sig-input" id="notes-input" rows="3" placeholder="Additional notes (optional)"></textarea>
      <div id="submit-area"></div>
    </div>
  </div>
</div>

<!-- REPORT -->
<div id="view-report" class="view">
  <div class="wrap">
    <div class="report-header">
      <button class="back-btn" id="report-back">← Back</button>
      <div class="report-title">Manager Report</div>
      <div id="role-label" style="font-size:12px;font-weight:700;color:#7f8c8d;padding:4px 10px;background:#f0f4f8;border-radius:20px;"></div>
      <button class="lock-btn" id="lock-btn">🔒 Lock</button>
    </div>
    <div class="section-label">Filter by Day</div>
    <div class="day-row" id="report-day-row"></div>
    <div class="report-stats" id="report-stats"></div>
    <div class="section-label">Completed Checklists</div>
    <div class="report-list" id="report-list"></div>
  </div>
</div>

<script type="module">

const MANAGER_PASSWORD = 'Edgerton2024';
const SENIOR_NURSE_PASSWORD = 'SeniorNurse2024';

// ── STATE ─────────────────────────────────────────────────────────────────
let weekOffset   = 0;
let selectedDay  = null;
let selectedSurg = null;
let selectedType = null;
let currentDoc   = null;
let homeCache    = {};
let homeListeners= [];
let clUnsubscribe= null;
let reportFilter = 'All';
let managerUnlocked = false;

// ── DATE HELPERS ──────────────────────────────────────────────────────────
const todayDate = new Date();
const todayStr  = todayDate.toISOString().split('T')[0];
document.getElementById('date-chip').textContent =
  todayDate.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});

function getWeekDates(offset) {
  const now = new Date();
  const dow = now.getDay();
  const diffToMon = (dow===0 ? -6 : 1-dow) + (offset*7);
  return Array.from({length:5},(_,i)=>{
    const d = new Date(now);
    d.setDate(now.getDate()+diffToMon+i);
    return d.toISOString().split('T')[0];
  });
}
function fmtShort(dateStr) {
  return new Date(dateStr+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function getDayName(dateStr) {
  return ['Sun','Mon','Tues','Weds','Thurs','Fri','Sat'][new Date(dateStr+'T12:00:00').getDay()];
}
function docId(surg, day, type) {
  return `${surg.replace(/ /g,'_')}__${day}__${type}`;
}

// Auto-select today if weekday, else Monday
const todayDow = todayDate.getDay();
if (todayDow>=1 && todayDow<=5) {
  selectedDay = todayStr;
} else {
  selectedDay = getWeekDates(0)[0];
}

// ── UI HELPERS ────────────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  window.scrollTo(0,0);
}
function setLoading(on) {
  document.getElementById('loading-overlay').style.display = on?'flex':'none';
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── HOME ──────────────────────────────────────────────────────────────────
function buildWeekNav() {
  const dates = getWeekDates(weekOffset);
  const lbl   = document.getElementById('week-label');
  const prefix= weekOffset===0?'This Week':weekOffset===-1?'Last Week':
                Math.abs(weekOffset)+' week'+(Math.abs(weekOffset)>1?'s':'')+' ago';
  lbl.innerHTML = `${prefix} <span>· ${fmtShort(dates[0])} – ${fmtShort(dates[4])}</span>`;
}

function buildDayRow() {
  const dates = getWeekDates(weekOffset);
  const row   = document.getElementById('day-row');
  row.innerHTML = '';
  dates.forEach((dateStr,i)=>{
    const btn = document.createElement('button');
    btn.className = 'day-btn'+(dateStr===selectedDay?' active':'');
    const isToday = dateStr===todayStr;
    btn.innerHTML = `<div>${DAYS[i]}</div><div style="font-size:11px">${dateStr.slice(8)}</div>${isToday?`<div class="today-dot">●</div>`:''}`;
    btn.onclick = ()=>{ selectedDay=dateStr; buildDayRow(); rebuildSurgeryListeners(); };
    row.appendChild(btn);
  });
}

  grid.innerHTML = '';

  SURGERIES.forEach(surg=>{

// Delegated listener for decon buttons (set once, works after every grid rebuild)

});

function refreshBadge(surg, type) {
  const id    = docId(surg, selectedDay, type);
  const cache = homeCache[id] || {checked:0, total:ITEMS[type].length, submitted:false};
  const pct   = Math.round((cache.checked/cache.total)*100);
  const label = (type==='start'||type==='decon-start')?'Start':'End';

  if (surg==='Decon_Room') {
    const btnId = type==='decon-start'?'decon-badge-start':'decon-badge-end';
    const btn   = document.getElementById(btnId);
    if (!btn) return;
    btn.className = 'cl-badge decon'+(cache.submitted?' done':cache.checked>0?' partial':'');
    btn.textContent = cache.submitted?`✓ ${label}`:cache.checked>0?`▶ ${label} ${pct}%`:`+ ${label}`;
    return;
  }

  const row = document.getElementById('badges-'+surg.replace(/ /g,'_'));
  if (!row) return;
  let btn = row.querySelector(`[data-type="${type}"]`);
  if (!btn) {
    btn = document.createElement('button');
    btn.dataset.type = type;
    row.appendChild(btn);
  }
  btn.className = 'cl-badge'+(cache.submitted?' done':cache.checked>0?' partial':'');
  btn.textContent = cache.submitted?`✓ ${label}`:cache.checked>0?`▶ ${label} ${pct}%`:`+ ${label}`;
  btn.onclick = ()=>openChecklist(surg, selectedDay, type);
}

function rebuildSurgeryListeners() {
  homeListeners.forEach(u=>u());
  homeListeners = [];
  buildWeekNav();
  buildDayRow();

  const allEntities = [...SURGERIES.map(s=>({surg:s,types:['start','end']})),
                       {surg:'Decon_Room',types:['decon-start','decon-end']}];

  allEntities.forEach(({surg,types})=>{
    types.forEach(type=>{
      const id  = docId(surg, selectedDay, type);
      const ref = doc(db,'checklists',id);
      const unsub = onSnapshot(ref, snap=>{
        const data = snap.exists()?snap.data():null;
        const checked = data?Object.values(data.items||{}).filter(Boolean).length:0;
        homeCache[id] = {checked, total:ITEMS[type].length, submitted:!!data?.submittedAt};
        refreshBadge(surg, type);
      });
      homeListeners.push(unsub);
    });
  });
}

function buildHome() {
  buildSurgeryGrid();
  rebuildSurgeryListeners();
}

// ── CHECKLIST ─────────────────────────────────────────────────────────────
window.openChecklist = function(surg, day, type) {
  selectedSurg = surg;
  selectedDay  = day;
  selectedType = type;

  document.getElementById('cl-title').textContent = TYPE_LABELS[type]||type;
  // Colour the checklist header bar based on room type
  const clHeader = document.querySelector('.cl-header');
  if (type==='decon-start'||type==='decon-end') {
    clHeader.style.borderLeft = '4px solid #c39bd3';
  } else if (['Surgery 2','Surgery 4','Surgery 10'].includes(surg)) {
    clHeader.style.borderLeft = '4px solid #27ae60';
  } else {
    clHeader.style.borderLeft = '4px solid #1a5276';
  }
  document.getElementById('cl-sub').textContent   =
    (surg==='Decon_Room'?'Decontamination Room':surg)+' · '+getDayName(day)+' '+fmtShort(day);

  showView('checklist');
  setLoading(true);

  managerEditing = false;
  if (clUnsubscribe) { clUnsubscribe(); clUnsubscribe=null; }

  const ref = doc(db,'checklists',docId(surg,day,type));
  clUnsubscribe = onSnapshot(ref, snap=>{
    currentDoc = snap.exists()?snap.data():{items:{},nurseSignature:'',managerSignature:'',notes:'',submittedAt:null};
    renderChecklist();
    setLoading(false);
  });
};

function renderChecklist() {
  const items     = ITEMS[selectedType];
  const data      = currentDoc;
  const submitted = !!data.submittedAt;
  const checked   = items.filter(i=>data.items?.[i]).length;

  // Progress ring
  const pct = (checked/items.length)*100;
  document.getElementById('ring-fill').setAttribute('stroke-dasharray',`${pct} 100`);
  document.getElementById('ring-fill').setAttribute('stroke',pct===100?'#27ae60':'#1a5276');
  document.getElementById('ring-text').textContent=`${checked}/${items.length}`;

  // Items
  const list = document.getElementById('item-list');
  list.innerHTML='';
  items.forEach(item=>{
    const row = document.createElement('label');
    row.className='item-row'+(data.items?.[item]?' checked':'');
    const cb = document.createElement('input');
    cb.type='checkbox'; cb.checked=!!data.items?.[item]; cb.disabled = submitted && !managerEditing;
    cb.onchange=()=>toggleItem(item,cb.checked);
    const span=document.createElement('span');
    span.className='item-text'; span.textContent=item;
    row.appendChild(cb); row.appendChild(span);
    list.appendChild(row);
  });

  // Sig fields
  const ni=document.getElementById('nurse-input');
  const mi=document.getElementById('manager-input');
  const no=document.getElementById('notes-input');
  ni.disabled=submitted; mi.disabled=submitted; no.disabled=submitted;
  if (!ni.value) ni.value=data.nurseSignature||'';
  if (!mi.value) mi.value=data.managerSignature||'';
  if (!no.value) no.value=data.notes||'';

  // Submit area
  const area=document.getElementById('submit-area');
  if (submitted) {
    const d=data.submittedAt?.toDate?data.submittedAt.toDate():new Date(data.submittedAt);
    let html=`<div class="submitted-badge">✓ Submitted — ${d.toLocaleString('en-GB')}</div>`;
    // Manager can edit submitted checklist
    if (managerUnlocked) {
      if (managerEditing) {
        html += `<div style="display:flex;gap:8px;margin-top:10px;">
          <button onclick="saveManagerEdits()" class="submit-btn" style="background:#1a5276">💾 Save Changes</button>
          <button onclick="cancelManagerEditing()" class="submit-btn" style="background:#95a5a6;flex:0 0 auto;padding:14px 18px">Cancel</button>
        </div>`;
      } else {
        html += `<button onclick="startManagerEditing()" class="submit-btn" style="background:#e67e22;margin-top:10px">✏️ Edit Checklist (Manager)</button>`;
      }
    }
    // Show senior/manager comment section
    if (seniorUnlocked || managerUnlocked) {
      const existingComment = data.seniorComment||'';
      const existingCommenter = data.seniorCommenter||'';
      const commentedAt = data.seniorCommentAt;
      html += `<div class="comment-section">
        <div class="comment-title">💬 ${currentRole==='manager'?'Manager':'Senior Nurse'} Comment</div>
        ${commentedAt ? `<div class="existing-comment">
          <div class="existing-comment-meta">${existingCommenter} · ${(commentedAt?.toDate?commentedAt.toDate():new Date(commentedAt)).toLocaleString('en-GB')}</div>
          <div class="existing-comment-text">${existingComment}</div>
          <button class="edit-comment-btn" onclick="document.getElementById('comment-edit-area').style.display='block';this.style.display='none'">Edit Comment</button>
        </div>`:''}
        <div id="comment-edit-area" style="${commentedAt?'display:none':'display:block'}">
          <textarea class="sig-input" id="senior-comment-input" rows="3" placeholder="Add a comment on this checklist…">${existingComment}</textarea>
          <input class="sig-input" id="senior-commenter-input" type="text" placeholder="Your name" value="${existingCommenter}"/>
          <button class="submit-btn" style="background:#7d3c98" onclick="saveComment()">Save Comment</button>
        </div>
      </div>`;
    } else if (data.seniorComment) {
      // Regular nurses can see comments but not edit
      const commentedAt = data.seniorCommentAt;
      html += `<div class="comment-section comment-readonly">
        <div class="comment-title">💬 Comment</div>
        <div class="existing-comment">
          <div class="existing-comment-meta">${data.seniorCommenter||''} · ${(commentedAt?.toDate?commentedAt.toDate():new Date(commentedAt)).toLocaleString('en-GB')}</div>
          <div class="existing-comment-text">${data.seniorComment}</div>
        </div>
      </div>`;
    }
    area.innerHTML=html;
  } else {
    area.innerHTML='';
    const btn=document.createElement('button');
    btn.className='submit-btn';
    btn.textContent='Submit Checklist';
    btn.onclick=submitChecklist;
    area.appendChild(btn);
  }
}

function startManagerEditing() {
  managerEditing = true;
  showToast('Edit mode on — tick or untick items as needed.');
  renderChecklist();
}
window.startManagerEditing = startManagerEditing;

function cancelManagerEditing() {
  managerEditing = false;
  renderChecklist();
}
window.cancelManagerEditing = cancelManagerEditing;

async function saveManagerEdits() {
  setLoading(true);
  const ref = doc(db,'checklists',docId(selectedSurg,selectedDay,selectedType));
  // Record that manager amended it
  await setDoc(ref, {
    ...currentDoc,
    managerAmended: true,
    managerAmendedAt: new Date(),
    managerAmendedBy: 'Manager'
  }, {merge:true});
  managerEditing = false;
  setLoading(false);
  showToast('✓ Checklist updated by manager.');
}
window.saveManagerEdits = saveManagerEdits;

async function saveComment() {
  const comment   = document.getElementById('senior-comment-input')?.value.trim();
  const commenter = document.getElementById('senior-commenter-input')?.value.trim();
  if (!commenter) { showToast('Please enter your name.'); return; }
  setLoading(true);
  const ref=doc(db,'checklists',docId(selectedSurg,selectedDay,selectedType));
  await setDoc(ref,{
    ...currentDoc,
    seniorComment: comment,
    seniorCommenter: commenter,
    seniorCommentAt: new Date(),
    seniorCommentRole: currentRole
  },{merge:true});
  setLoading(false);
  showToast('✓ Comment saved.');
}
window.saveComment = saveComment;

async function toggleItem(item,val) {
  const ref=doc(db,'checklists',docId(selectedSurg,selectedDay,selectedType));
  await setDoc(ref,{
    ...currentDoc,
    items:{...currentDoc.items,[item]:val},
    surgery:selectedSurg, day:selectedDay, dayName:getDayName(selectedDay), type:selectedType
  },{merge:true});
}

async function submitChecklist() {
  const nurse  =document.getElementById('nurse-input').value.trim();
  const manager=document.getElementById('manager-input').value.trim();
  const notes  =document.getElementById('notes-input').value.trim();
  if (!nurse){showToast('Please enter a nurse name to submit.');return;}
  setLoading(true);
  const ref=doc(db,'checklists',docId(selectedSurg,selectedDay,selectedType));
  await setDoc(ref,{
    ...currentDoc,
    nurseSignature:nurse, managerSignature:manager, notes:notes,
    submittedAt:new Date(),
    surgery:selectedSurg, day:selectedDay, dayName:getDayName(selectedDay), type:selectedType
  },{merge:true});
  setLoading(false);
  showToast('✓ Checklist submitted!');
}

function buildReportDayRow() {
  const row=document.getElementById('report-day-row');
  row.innerHTML='';
  ['All',...DAYS].forEach(d=>{
    const btn=document.createElement('button');
    btn.className='day-btn'+(d===reportFilter?' active':'');
    btn.textContent=d;
    btn.onclick=async()=>{reportFilter=d;buildReportDayRow();setLoading(true);await loadReport();setLoading(false);};
    row.appendChild(btn);

async function loadReport() {
  const listEl =document.getElementById('report-list');
  const statsEl=document.getElementById('report-stats');
  listEl.innerHTML='<div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>';

  const snap=await getDocs(collection(db,'checklists'));
  let docs=[];
  snap.forEach(d=>{if(d.data().submittedAt)docs.push(d.data());});
  if (reportFilter!=='All') docs=docs.filter(d=>d.dayName===reportFilter);
  docs.sort((a,b)=>{
    const at=a.submittedAt?.toDate?a.submittedAt.toDate():new Date(a.submittedAt||0);
    const bt=b.submittedAt?.toDate?b.submittedAt.toDate():new Date(b.submittedAt||0);
    return bt-at;
  });

  const total    =docs.length;
  const complete =docs.filter(d=>ITEMS[d.type]?.every(i=>d.items?.[i])).length;
  const startN   =docs.filter(d=>d.type==='start').length;
  const endN     =docs.filter(d=>d.type==='end').length;
  const deconN   =docs.filter(d=>d.type==='decon-start'||d.type==='decon-end').length;
  statsEl.innerHTML=`
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Submitted</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#27ae60">${complete}</div><div class="stat-label">Fully Complete</div></div>
    <div class="stat-card"><div class="stat-num">${startN}</div><div class="stat-label">Surgery Start</div></div>
    <div class="stat-card"><div class="stat-num">${endN}</div><div class="stat-label">Surgery End</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#7d3c98">${deconN}</div><div class="stat-label">Decon Room</div></div>`;

  if (!docs.length){
    listEl.innerHTML=`<div class="empty-state"><div class="empty-emoji">📋</div>No completed checklists${reportFilter!=='All'?' for '+reportFilter:''}.</div>`;
    return;
  }

  listEl.innerHTML='';
  docs.forEach(d=>{
    const items  =ITEMS[d.type]||[];
    const checked=items.filter(i=>d.items?.[i]).length;
    const allDone=checked===items.length;
    const missing=items.filter(i=>!d.items?.[i]);
    const subDate=d.submittedAt?.toDate?d.submittedAt.toDate():new Date(d.submittedAt);
    const surgLabel=d.surgery==='Decon_Room'?'Decontamination Room':d.surgery;

    const card=document.createElement('div');
    const isHygReport = ['Surgery 2','Surgery 4','Surgery 10'].includes(d.surgery);
    const isDeconReport = d.surgery==='Decon_Room';
    card.className='report-card'+(allDone?'':' incomplete');
    if (isDeconReport) card.style.borderLeftColor='#c39bd3';
    else if (isHygReport) card.style.borderLeftColor='#27ae60';
    card.innerHTML=`
      <div class="report-card-top">
        <div>
          <span class="report-card-id">${surgLabel}</span>
          <span class="report-card-type"> · ${TYPE_LABELS[d.type]||d.type}</span>
          <span class="report-card-day"> · ${d.dayName||''} ${fmtShort(d.day)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="${allDone?'report-status-full':'report-status-part'}">${allDone?'✓ Complete':`${checked}/${items.length}`}</span>
          <span class="view-hint">View →</span>
        </div>
      </div>
      <div class="report-meta">Nurse: <strong>${d.nurseSignature||'—'}</strong>${d.managerSignature?` · Manager: <strong>${d.managerSignature}</strong>`:''}</div>
      <div class="report-meta">Submitted: <strong>${subDate.toLocaleString('en-GB')}</strong></div>
      ${d.notes?`<div class="notes-box"><div class="notes-label">NOTES</div>${d.notes}</div>`:''}
      ${d.managerAmended?`<div style="display:inline-block;background:#fff3e0;border:1px solid #f39c12;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;color:#e67e22;margin-top:6px;">✏️ Amended by Manager · ${(d.managerAmendedAt?.toDate?d.managerAmendedAt.toDate():new Date(d.managerAmendedAt)).toLocaleString('en-GB')}</div>`:''}
      ${d.seniorComment?`<div class="notes-box" style="border-color:#c39bd3;background:#f9f4ff"><div class="notes-label" style="color:#7d3c98">💬 ${d.seniorCommenter||'COMMENT'}</div>${d.seniorComment}</div>`:''}
      ${missing.length?`<div class="missing-box"><div class="missing-title">⚠ Not completed (${missing.length}):</div>${missing.map(m=>`<div class="missing-item">• ${m}</div>`).join('')}</div>`:''}`;
    card.onclick=()=>{
      fromReport=true;
      openChecklist(d.surgery, d.day, d.type);
    };
    listEl.appendChild(card);
  });
}

function openPasswordModal(){
  const modal=document.getElementById('pw-modal');
  document.getElementById('pw-input').value='';
  document.getElementById('pw-error').textContent='';
  document.getElementById('pw-input').classList.remove('shake');
  modal.classList.remove('hidden');
  setTimeout(()=>document.getElementById('pw-input').focus(),100);
}
function closePasswordModal(){
  document.getElementById('pw-modal').classList.add('hidden');
}
let selectedRole = 'manager';
function checkPassword(){
  const input=document.getElementById('pw-input');
  const err  =document.getElementById('pw-error');
  const correct = selectedRole==='manager'
    ? input.value===MANAGER_PASSWORD
    : input.value===SENIOR_NURSE_PASSWORD;
  if (correct){
    if (selectedRole==='manager') managerUnlocked=true;
    else seniorUnlocked=true;
    currentRole=selectedRole;
    closePasswordModal();
    openReport();
  } else {
    err.textContent='Incorrect password. Please try again.';
    input.classList.add('shake');
    input.value='';
    setTimeout(()=>{input.classList.remove('shake');input.focus();},350);
  }
}
document.getElementById('pw-confirm').onclick=checkPassword;
document.getElementById('pw-cancel').onclick=closePasswordModal;
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword();});
document.getElementById('role-selector').addEventListener('click',e=>{
  const btn=e.target.closest('.role-btn');
  if(!btn) return;
  selectedRole=btn.dataset.role;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pw-input').value='';
  document.getElementById('pw-error').textContent='';
  document.getElementById('pw-input').focus();
});

// ── WEEK NAVIGATION ───────────────────────────────────────────────────────
document.getElementById('week-prev').onclick=()=>{
  weekOffset--;
  selectedDay=getWeekDates(weekOffset)[0];
  buildHome();
};
document.getElementById('week-next').onclick=()=>{
  weekOffset++;
  selectedDay=getWeekDates(weekOffset)[0];
  buildHome();
};

// ── INIT ──────────────────────────────────────────────────────────────────
buildWeekNav();
buildHome();
setLoading(false);
</script>
